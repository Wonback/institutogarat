<header class="text-gray-600 body-font">
  <div class="drawer">
    <input id="my-drawer-2" type="checkbox" class="drawer-toggle" #drawerCheckbox />
    <div class="drawer-content flex flex-col">
      <!-- Mobile Navbar -->
      <div
        class="navbar bg-base-300 w-full lg:hidden min-h-20 py-3 flex justify-between items-center"
      >
        <div class="flex-none z-20">
          <label for="my-drawer-2" aria-label="open sidebar" class="btn btn-square btn-ghost">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              class="inline-block h-6 w-6 stroke-current"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"
              ></path>
            </svg>
          </label>
        </div>
        <div class="flex-1 flex justify-center">
          <a routerLink="/" (click)="drawerCheckbox.checked = false" class="btn btn-ghost h-auto p-0 hover:bg-transparent text-3xl font-bold flex items-center gap-2">
            <lucide-icon class="text-green-500" name="cross" [size]="32"></lucide-icon>
            <span>I.M.Q.G</span>
          </a>
        </div>
        <div class="w-[48px] flex-none"></div>
      </div>
      <!-- Desktop Navbar -->
      <header class="text-gray-600 body-font shadow-lg hidden lg:flex flex-col bg-base-300">
        <div class="container mx-auto flex flex-wrap p-5 flex-row items-center justify-between">
          <a routerLink="/" class="flex title-font font-medium items-center text-gray-900 mb-4 md:mb-0 cursor-pointer">
            <img
              ngSrc="assets/images/garatlogo.png"
              alt="Instituto Garat"
              width="400"
              height="100"
              class="w-[30vw] max-w-[350px] h-auto"
              priority
            />
          </a>
          <a
            routerLink="/"
            fragment="contacto"
            class="contact-btn cursor-pointer inline-flex items-center bg-gray-100 border-0 py-1 px-3 focus:outline-none hover:bg-gray-200 rounded text-base mt-4 md:mt-0"
          >
            Contacto
            <lucide-icon name="mail" class="w-4 h-4 ml-1"></lucide-icon>
          </a>
        </div>
        <div class="w-full border-t border-gray-300/50">
          <nav class="container mx-auto py-3 flex flex-wrap items-center text-lg justify-center gap-8">
            <a
              routerLink="/cirugia"
              routerLinkActive="text-green-500 after:w-full"
              class="hover:text-gray-900 cursor-pointer relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 after:bg-green-500 after:transition-all after:duration-300 hover:after:w-full"
              >Cirugía</a
            >
            <a
              routerLink="/gastro"
              routerLinkActive="text-green-500 after:w-full"
              class="hover:text-gray-900 cursor-pointer relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 after:bg-green-500 after:transition-all after:duration-300 hover:after:w-full"
              >Gastro</a
            >
            <a
              routerLink="/urologia"
              routerLinkActive="text-green-500 after:w-full"
              class="hover:text-gray-900 cursor-pointer relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 after:bg-green-500 after:transition-all after:duration-300 hover:after:w-full"
              >Urología</a
            >
            <a
              routerLink="/neonatologia"
              routerLinkActive="text-green-500 after:w-full"
              class="hover:text-gray-900 cursor-pointer relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 after:bg-green-500 after:transition-all after:duration-300 hover:after:w-full"
              >Neo</a
            >
            <a
              routerLink="/hemodinamia"
              routerLinkActive="text-green-500 after:w-full"
              class="hover:text-gray-900 cursor-pointer relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 after:bg-green-500 after:transition-all after:duration-300 hover:after:w-full"
              >Hemodinámia</a
            >
            <a
              routerLink="/clinica"
              routerLinkActive="text-green-500 after:w-full"
              class="hover:text-gray-900 cursor-pointer relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 after:bg-green-500 after:transition-all after:duration-300 hover:after:w-full"
              >Clínica</a
            >
            <a
              routerLink="/nutricion"
              routerLinkActive="text-green-500 after:w-full"
              class="hover:text-gray-900 cursor-pointer relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 after:bg-green-500 after:transition-all after:duration-300 hover:after:w-full"
              >Nutrición</a
            >
            <a
              routerLink="/terapia"
              routerLinkActive="text-green-500 after:w-full"
              class="hover:text-gray-900 cursor-pointer relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 after:bg-green-500 after:transition-all after:duration-300 hover:after:w-full"
              >Terapia</a
            >
            <a
              routerLink="/traumatologia"
              routerLinkActive="text-green-500 after:w-full"
              class="hover:text-gray-900 cursor-pointer relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 after:bg-green-500 after:transition-all after:duration-300 hover:after:w-full"
              >Traumatología</a
            >
            <a
              routerLink="/guardia"
              routerLinkActive="text-green-500 after:w-full"
              class="hover:text-gray-900 cursor-pointer relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 after:bg-green-500 after:transition-all after:duration-300 hover:after:w-full"
              >Guardia</a
            >
          </nav>
        </div>
      </header>
      <!-- Page content here -->
    </div>
    <div class="drawer-side">
      <label for="my-drawer-2" aria-label="close sidebar" class="drawer-overlay"></label>
      <ul class="menu bg-base-200 min-h-full w-80 px-4 pt-25 text-xl gap-1">
        <!-- Sidebar content here -->
        <li><a routerLink="/" class="font-bold" (click)="drawerCheckbox.checked = false">Volver a inicio</a></li>
        <div class="flex w-full flex-col">
  
  <div class="divider"></div>
  
</div>
        <li><a routerLink="/cirugia" (click)="drawerCheckbox.checked = false">Cirugía</a></li>
        <li><a routerLink="/gastro" (click)="drawerCheckbox.checked = false">Gastro</a></li>
        <li><a routerLink="/urologia" (click)="drawerCheckbox.checked = false">Urología</a></li>
        <li><a routerLink="/neonatologia" (click)="drawerCheckbox.checked = false">Neo</a></li>
        <li><a routerLink="/hemodinamia" (click)="drawerCheckbox.checked = false">Hemodinámia</a></li>
        <li><a routerLink="/clinica" (click)="drawerCheckbox.checked = false">Clínica</a></li>
        <li><a routerLink="/nutricion" (click)="drawerCheckbox.checked = false">Nutrición</a></li>
        <li><a routerLink="/terapia" (click)="drawerCheckbox.checked = false">Terapia</a></li>
        <li><a routerLink="/traumatologia" (click)="drawerCheckbox.checked = false">Traumatología</a></li>
        <li><a routerLink="/guardia" (click)="drawerCheckbox.checked = false">Guardia</a></li>
      </ul>
    </div>
  </div>
</header>
